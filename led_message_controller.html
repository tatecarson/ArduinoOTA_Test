<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arduino LED Matrix Controller</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(420px, calc(100vw - 32px));
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      line-height: 1.1;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      font-weight: 650;
    }

    input,
    select,
    button {
      box-sizing: border-box;
      width: 100%;
      min-height: 44px;
      border-radius: 6px;
      font: inherit;
    }

    input,
    select {
      border: 1px solid color-mix(in srgb, CanvasText 30%, transparent);
      padding: 8px 10px;
      background: Canvas;
      color: CanvasText;
    }

    button {
      margin-top: 16px;
      border: 0;
      background: #16704a;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.72;
    }

    .peers {
      margin-top: 24px;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
    }

    .peers h2 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .peers .self {
      font-size: 13px;
      opacity: 0.8;
      margin: 0 0 8px;
    }

    .peers ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
    }

    .peers li {
      margin: 2px 0;
    }

    .peers .empty {
      font-size: 13px;
      opacity: 0.7;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot.stale {
      background: #d97706;
    }

    iframe {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Arduino LED Matrix</h1>

    <form id="message-form">
      <label for="text">Message</label>
      <input id="text" name="text" autocomplete="off" maxlength="4" value="TATE">

      <label for="target">Send to</label>
      <select id="target" name="target">
        <option value="all">All boards</option>
        <option value="self">Connected board only</option>
      </select>

      <button type="submit">Send Message</button>
    </form>

    <div class="status" id="status" role="status"></div>
    <p class="hint">Use up to 4 letters or numbers. Keep this computer on the same WiFi network as the Arduino.</p>

    <section class="peers" id="peers">
      <h2>Network</h2>
      <p class="self" id="self">Checking configured boards...</p>
      <ul id="peer-list"></ul>
      <p class="empty" id="peer-empty" hidden>No boards responded yet.</p>
    </section>
  </main>

  <div id="senders" aria-hidden="true"></div>

  <script>
    const form = document.querySelector("#message-form");
    const textInput = document.querySelector("#text");
    const targetSelect = document.querySelector("#target");
    const status = document.querySelector("#status");
    const senders = document.querySelector("#senders");
    const selfEl = document.querySelector("#self");
    const peerList = document.querySelector("#peer-list");
    const peerEmpty = document.querySelector("#peer-empty");
    const configuredBoards = [
      "192.168.8.138",
      "192.168.8.213",
      "192.168.8.198"
    ];

    let pollTimer = null;
    let currentBoards = configuredBoards.map((ip) => boardFromIp(ip));

    renderTargets();
    startPolling();

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = textInput.value.trim().slice(0, 4);

      if (!text) {
        status.textContent = "Enter a short message.";
        return;
      }

      const targets = selectedTargets();
      if (targets.length === 0) {
        status.textContent = "No board selected.";
        return;
      }

      sendMessage(targets, text, targetSelect.value === "all");
      const label = targets.length === 1 ? targets[0].label : `${targets.length} boards`;
      status.textContent = `Sent "${text.toUpperCase()}" to ${label}`;
      refreshBoards();
    });

    function startPolling() {
      if (pollTimer) return;
      refreshBoards();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(refreshBoards, 2000);
    }

    async function refreshBoards() {
      const results = await Promise.all(configuredBoards.map(fetchBoardStatus));
      currentBoards = boardListFromStatuses(results);
      renderTargets();
      renderNetwork(results);
    }

    async function fetchBoardStatus(ip) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 1200);
      try {
        const res = await fetch(`http://${ip}/peers.json`, {
          cache: "no-store",
          signal: controller.signal
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return { ip, ok: true, data };
      } catch (err) {
        return { ip, ok: false, error: err.message || "No response" };
      } finally {
        clearTimeout(timeout);
      }
    }

    function boardListFromStatuses(statuses) {
      const boards = new Map(configuredBoards.map((ip) => [ip, boardFromIp(ip)]));

      for (const status of statuses) {
        if (!status.ok) continue;
        const self = status.data.self || {};
        boards.set(status.ip, {
          id: self.id ?? "?",
          ip: status.ip,
          label: `id ${self.id ?? "?"} @ ${status.ip}`,
          self: false,
          online: true
        });
      }

      return [...boards.values()];
    }

    function boardFromIp(ip) {
      return {
        id: "?",
        ip,
        label: ip,
        self: false,
        online: false
      };
    }

    function renderTargets() {
      const previous = targetSelect.value;
      targetSelect.replaceChildren();

      const all = document.createElement("option");
      all.value = "all";
      all.textContent = currentBoards.length > 1 ? `All boards (${currentBoards.length})` : "All boards";
      targetSelect.appendChild(all);

      for (const board of currentBoards) {
        const option = document.createElement("option");
        option.value = board.ip;
        option.textContent = `${board.self ? "Connected board" : "Board"} ${board.label}`;
        targetSelect.appendChild(option);
      }

      if ([...targetSelect.options].some((option) => option.value === previous)) {
        targetSelect.value = previous;
      }
    }

    function selectedTargets() {
      if (targetSelect.value === "all") {
        return currentBoards;
      }

      const board = currentBoards.find((candidate) => candidate.ip === targetSelect.value);
      if (board) return [board];

      return [];
    }

    function sendMessage(targets, text, allBoards) {
      senders.replaceChildren();
      const sync = allBoards && targets.length === 1 ? "1" : "0";
      for (const board of targets) {
        const frame = document.createElement("iframe");
        frame.title = `Send to ${board.ip}`;
        frame.src = `http://${board.ip}/msg?text=${encodeURIComponent(text)}&sync=${sync}`;
        senders.appendChild(frame);
      }
    }

    function renderNetwork(statuses) {
      const online = statuses.filter((status) => status.ok);
      selfEl.replaceChildren();
      selfEl.append(`Reachable boards: ${online.length} of ${configuredBoards.length}`);
      peerList.replaceChildren();
      peerEmpty.hidden = online.length > 0;

      for (const status of statuses) {
        const li = document.createElement("li");
        const dot = document.createElement("span");
        dot.className = status.ok ? "dot" : "dot stale";
        li.append(dot);

        if (status.ok) {
          const self = status.data.self || {};
          li.append("id ");
          const idEl = document.createElement("strong");
          idEl.textContent = String(self.id ?? "?");
          li.append(idEl, ` @ ${status.ip} `);
          const detail = document.createElement("span");
          detail.style.opacity = ".7";
          detail.textContent = `(uptime ${formatMs(self.uptimeMs)})`;
          li.append(detail);
        } else {
          li.append(`${status.ip} `);
          const detail = document.createElement("span");
          detail.style.opacity = ".7";
          detail.textContent = "(no response)";
          li.append(detail);
        }

        peerList.appendChild(li);
      }
    }

    function formatMs(ms) {
      if (typeof ms !== "number") return "?";
      const s = Math.floor(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ${s % 60}s`;
      const h = Math.floor(m / 60);
      return `${h}h ${m % 60}m`;
    }
  </script>
</body>
</html>
