<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arduino LED Matrix Controller</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(420px, calc(100vw - 32px));
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      line-height: 1.1;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      font-weight: 650;
    }

    input,
    button {
      box-sizing: border-box;
      width: 100%;
      min-height: 44px;
      border-radius: 6px;
      font: inherit;
    }

    input {
      border: 1px solid color-mix(in srgb, CanvasText 30%, transparent);
      padding: 8px 10px;
      background: Canvas;
      color: CanvasText;
    }

    button {
      margin-top: 16px;
      border: 0;
      background: #16704a;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.72;
    }

    .peers {
      margin-top: 24px;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
    }

    .peers h2 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .peers .self {
      font-size: 13px;
      opacity: 0.8;
      margin: 0 0 8px;
    }

    .peers ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
    }

    .peers li {
      margin: 2px 0;
    }

    .peers .empty {
      font-size: 13px;
      opacity: 0.7;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot.stale {
      background: #d97706;
    }

    iframe {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Arduino LED Matrix</h1>

    <form id="message-form">
      <label for="ip">Arduino IP address</label>
      <input id="ip" name="ip" inputmode="decimal" autocomplete="off" value="192.168.0.102">

      <label for="text">Message</label>
      <input id="text" name="text" autocomplete="off" maxlength="4" value="TATE">

      <button type="submit">Send To Matrix</button>
    </form>

    <div class="status" id="status" role="status"></div>
    <p class="hint">Use up to 4 letters or numbers. Keep this computer on the same WiFi network as the Arduino.</p>

    <section class="peers" id="peers">
      <h2>Network</h2>
      <p class="self" id="self">Enter an Arduino IP and submit to see the cluster.</p>
      <ul id="peer-list"></ul>
      <p class="empty" id="peer-empty" hidden>No other boards seen yet.</p>
    </section>
  </main>

  <iframe id="sender" title="Arduino request sender"></iframe>

  <script>
    const form = document.querySelector("#message-form");
    const ipInput = document.querySelector("#ip");
    const textInput = document.querySelector("#text");
    const status = document.querySelector("#status");
    const sender = document.querySelector("#sender");
    const selfEl = document.querySelector("#self");
    const peerList = document.querySelector("#peer-list");
    const peerEmpty = document.querySelector("#peer-empty");

    let pollTimer = null;
    let lastIp = "";

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const ip = ipInput.value.trim();
      const text = textInput.value.trim().slice(0, 4);

      if (!ip || !text) {
        status.textContent = "Enter an IP address and a short message.";
        return;
      }

      const url = `http://${ip}/msg?text=${encodeURIComponent(text)}`;
      sender.src = url;
      status.textContent = `Sent "${text.toUpperCase()}" to ${ip}`;
      startPolling(ip);
    });

    ipInput.addEventListener("change", () => {
      const ip = ipInput.value.trim();
      if (ip) startPolling(ip);
    });

    function startPolling(ip) {
      if (ip === lastIp && pollTimer) return;
      lastIp = ip;
      if (pollTimer) clearInterval(pollTimer);
      refreshPeers(ip);
      pollTimer = setInterval(() => refreshPeers(ip), 2000);
    }

    async function refreshPeers(ip) {
      try {
        const res = await fetch(`http://${ip}/peers.json`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderPeers(data);
      } catch (err) {
        selfEl.textContent = `Could not reach ${ip}: ${err.message}`;
        peerList.replaceChildren();
        peerEmpty.hidden = true;
      }
    }

    function renderPeers(data) {
      const self = data.self || {};
      selfEl.replaceChildren();
      const selfDot = document.createElement("span");
      selfDot.className = "dot";
      selfEl.append(selfDot, "This board: id ");
      const selfId = document.createElement("strong");
      selfId.textContent = String(self.id ?? "?");
      selfEl.append(selfId, ` @ ${String(self.ip ?? "?")} (uptime ${formatMs(self.uptimeMs)})`);

      const peers = Array.isArray(data.peers) ? data.peers : [];
      peerList.replaceChildren();
      peerEmpty.hidden = peers.length > 0;

      for (const p of peers) {
        const li = document.createElement("li");
        const stale = (typeof p.lastSeenMs === "number") && p.lastSeenMs > 1500;
        const dot = document.createElement("span");
        dot.className = stale ? "dot stale" : "dot";
        li.append(dot, "id ");
        const idEl = document.createElement("strong");
        idEl.textContent = String(p.id ?? "?");
        li.append(idEl, ` @ ${String(p.ip ?? "?")} `);
        const age = document.createElement("span");
        age.style.opacity = ".7";
        age.textContent = `(seen ${Number(p.lastSeenMs ?? 0)} ms ago)`;
        li.append(age);
        peerList.appendChild(li);
      }
    }

    function formatMs(ms) {
      if (typeof ms !== "number") return "?";
      const s = Math.floor(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ${s % 60}s`;
      const h = Math.floor(m / 60);
      return `${h}h ${m % 60}m`;
    }
  </script>
</body>
</html>
